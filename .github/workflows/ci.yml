name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Unit tests don't hit the DB or external services.
      # These placeholders satisfy any module-level imports.
      DATABASE_URL: postgresql://ci:ci@localhost/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-for-build-only
      JWT_SECRET: ci-jwt-secret-for-tests
      GOOGLE_CLIENT_ID: ci-google-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      OPENAI_API_KEY: sk-ci-placeholder
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate

      - name: Unit tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: test

    env:
      DATABASE_URL: postgresql://ci:ci@localhost/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-for-build-only
      GOOGLE_CLIENT_ID: ci-google-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      OPENAI_API_KEY: sk-ci-placeholder
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
